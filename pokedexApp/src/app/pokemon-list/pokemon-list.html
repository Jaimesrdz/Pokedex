<div class="card-container">
    <div class="card" *ngFor="let pokemon of pokemonList">
        <div class="card-header">
            <img [src]="pokemon.sprites.other.showdown.front_default" alt="sprite" />   
        </div>
        <div class="card-info">
            <p>{{ pokemon.name }}</p>
            <p>Type: {{ pokemon.types[0].type.name}}</p>
            <p>HP: {{ pokemon.stats[0].base_stat }}</p>
            <p>ATK: {{ pokemon.stats[1].base_stat }}</p>
        </div>
    </div>
</div>
