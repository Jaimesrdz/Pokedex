<header>
    <h1>Hello, Trainer</h1>
    <select  #filter (change)="onFilterChange(filter.value)">
        <option value="id">Sort By ID</option>
        <option value="type">Sort By Type</option>
        <option value="hp">Sort By HP</option>
    </select>
    <div class="search-bar">
        <input type="text" placeholder="Search Pokemon" (input)="onSearch($event.target.value)"/>
    </div>
</header>
